openapi: 3.1.0
info:
  title: Autos Reputation Agent Router
  version: 1.1.1
  description: Action schema for the automotive reputation agent.

servers:
  - url: https://gmb-cidef.vercel.app

paths:
  /api/agent/router:
    post:
      operationId: routeAutosAgentIntent
      summary: Route an automotive reputation analysis request to the backend query engine
      description: Uses tenant_id fixed to autos as the public tenant alias and queries the Neon runtime through the agent router. The default ownership scope is own; use competitor or all only for explicit competitive questions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRouterRequest'
      responses:
        '200':
          description: Routed query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRouterResponse'

components:
  schemas:
    AgentRouterRequest:
      type: object
      required:
        - intent
        - tenant_id
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          const: autos
          description: Fixed public tenant alias for the Autos agent. Always use autos. Do not allow user override.
        intent:
          type: string
          enum:
            - ranking
            - gap
            - temporal
            - evidence
            - action
            - cause
            - review_count
        params:
          $ref: '#/components/schemas/AgentRouterParams'

    AgentRouterParams:
      type: object
      additionalProperties: false
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        date_from:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        date_to:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        scope:
          type: string
          enum:
            - intra
            - extra
            - temporal
        dimension:
          type: string
          enum:
            - location
            - brand
            - operator
            - store_role
            - market_group
            - region
        metric:
          type: string
          enum:
            - rating
            - reviews_count
            - gap_vs_top
            - position
            - delta_rating
            - delta_reviews_count
            - delta_gap_vs_top
            - delta_position
        filters:
          $ref: '#/components/schemas/QueryFilters'
        output:
          $ref: '#/components/schemas/QueryOutput'

    QueryFilters:
      type: object
      additionalProperties: false
      properties:
        location:
          type: string
          description: Normalized location filter when the user asks about a specific location.
        market_group:
          type: string
          description: City or major market area.
        region:
          type: string
          description: Region filter.
        industry:
          type: string
          const: automotive
          default: automotive
          description: Fixed industry for Autos.
        brand:
          type: string
        ownership_group:
          type: string
          enum:
            - own
            - competitor
            - all
          default: own
          description: Default to own for direct brand questions. Use competitor or all only when the user explicitly asks for competition, benchmark, market comparison, or who is winning against the brand.
        own_values:
          type: array
          items:
            type: string
        store_role:
          type: string
          enum:
            - dealer
            - service
            - parts
            - all
          default: dealer
          description: Default to dealer unless the user explicitly asks for service, parts, or all roles.
        valid_only:
          type: boolean
          default: true
          description: Default true. Exclude invalid/non-operational places unless debugging.
        rating_min:
          type: number
          minimum: 1
          maximum: 5
          description: Minimum review rating when the user asks for a star range.
        rating_max:
          type: number
          minimum: 1
          maximum: 5
          description: Maximum review rating when the user asks for a star range.

    QueryOutput:
      type: object
      additionalProperties: false
      properties:
        shape:
          type: string
          enum:
            - compact
            - raw
          default: compact
        max_rows:
          type: integer
          minimum: 1
          maximum: 200
          description: Maximum aggregate rows to return for ranking/gap/temporal intents. This does not control review pagination for evidence/review_count.
        include_evidence:
          type: boolean
        evidence_per_row:
          type: integer
          minimum: 1
          maximum: 200
          description: Legacy evidence count hint. For evidence/review_count intents this is treated as review page size when limit is omitted.
        limit:
          type: integer
          minimum: 1
          maximum: 200
          description: Review page size for evidence/review_count intents. Use with offset to paginate all matching reviews.
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Zero-based review offset for evidence/review_count intents. Continue with next_offset until has_more is false.
        sort:
          type: string
          enum:
            - asc
            - desc

    AgentRouterResponse:
      type: object
      properties:
        ok:
          type: boolean
        tenant_id:
          type: string
        intent:
          type: string
        engine:
          type: string
        semantic_required:
          type: boolean
        shape:
          type: string
        result:
          type: object
          properties:
            ok:
              type: boolean
            query:
              type: object
            rows:
              type: array
              items:
                $ref: '#/components/schemas/CompactRow'
            row_count:
              type: integer
            total_reviews:
              type: integer
            rating_1_reviews:
              type: integer
            rating_2_reviews:
              type: integer
            rating_3_reviews:
              type: integer
            rating_4_reviews:
              type: integer
            rating_5_reviews:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            reviews_returned:
              type: integer
            has_more:
              type: boolean
            next_offset:
              type:
                - integer
                - 'null'
            evidence_returned:
              type: integer
            evidence_limit:
              type: integer
            is_partial:
              type: boolean
            evidence:
              type: array
              items:
                $ref: '#/components/schemas/Evidence'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Evidence'
            source:
              type: string

    CompactRow:
      type: object
      properties:
        location:
          type: string
        brand:
          type: string
        operator:
          type: string
        store_role:
          type: string
        market_group:
          type: string
        region:
          type: string
        rating:
          type: number
        reviews:
          type: integer
        confidence:
          type: string
          enum:
            - baja
            - media
            - alta
        gap_vs_top:
          type: number
        position:
          type: integer
        top_brand:
          type: string
        top_name:
          type: string
        top_rating:
          type: number
        top_reviews:
          type: integer
        date_from:
          type: string
        date_to:
          type: string
        delta_rating:
          type: number
        delta_reviews_count:
          type: number
        delta_gap_vs_top:
          type: number
        delta_position:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'

    Evidence:
      type: object
      properties:
        place_id:
          type: string
        name:
          type: string
        review_hash:
          type: string
        rating:
          type: number
        text:
          type: string
        author:
          type: string
        review_date:
          type: string
        sentiment:
          type: string
        topic:
          type: string
        severity:
          type: string
        risk_type:
          type: string
        requires_alert:
          type: boolean
        summary:
          type: string
        evidence_excerpt:
          type: string
