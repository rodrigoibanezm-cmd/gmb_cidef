openapi: 3.1.0
info:
  title: Autos Reputation Agent Router
  version: 1.1.2
  description: Action schema for the automotive reputation agent.

servers:
  - url: https://gmb-cidef.vercel.app

paths:
  /api/agent/router:
    post:
      operationId: routeAutosAgentIntent
      summary: Route an automotive reputation analysis request to the backend query engine
      description: Uses tenant_id fixed to autos as the public tenant alias and queries the Neon runtime through the agent router.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRouterRequest'
      responses:
        '200':
          description: Routed query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRouterResponse'

components:
  schemas:
    AgentRouterRequest:
      type: object
      required:
        - intent
        - tenant_id
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          const: autos
          description: Fixed public tenant alias for Autos. Always use autos.
        intent:
          type: string
          enum:
            - ranking
            - gap
            - temporal
            - evidence
            - action
            - cause
            - review_count
            - competitive_discovery_landscape
        params:
          $ref: '#/components/schemas/AgentRouterParams'

    AgentRouterParams:
      type: object
      additionalProperties: false
      properties:
        date:
          type:
            - string
            - 'null'
          pattern: '^\d{4}-\d{2}-\d{2}$'
        date_from:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        date_to:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'

        scope:
          type: string
          enum:
            - intra
            - extra
            - temporal
        dimension:
          type: string
          enum:
            - location
            - brand
            - operator
            - store_role
            - market_group
            - region
        metric:
          type: string
          enum:
            - rating
            - reviews_count
            - gap_vs_top
            - position
            - delta_rating
            - delta_reviews_count
            - delta_gap_vs_top
            - delta_position

        industry:
          type: string
          const: automotive
          default: automotive
          description: Top-level shortcut for competitive_discovery_landscape.
        store_role:
          type: string
          enum:
            - dealer
            - service
            - parts
            - all
          default: dealer
          description: Top-level shortcut for competitive_discovery_landscape.
        ownership_group:
          type: string
          enum:
            - own
            - competitor
            - all
          default: all
          description: Top-level shortcut for competitive_discovery_landscape.
        valid_only:
          type: boolean
          default: true
          description: Top-level shortcut for competitive_discovery_landscape.
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 200
          description: Page size for competitive_discovery_landscape places.
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Zero-based offset for competitive_discovery_landscape places.

        filters:
          $ref: '#/components/schemas/QueryFilters'
        output:
          $ref: '#/components/schemas/QueryOutput'

    QueryFilters:
      type: object
      additionalProperties: false
      properties:
        location:
          type: string
        market_group:
          type: string
        region:
          type: string
        industry:
          type: string
          const: automotive
          default: automotive
        brand:
          type: string
        ownership_group:
          type: string
          enum:
            - own
            - competitor
            - all
          default: own
        own_values:
          type: array
          items:
            type: string
        store_role:
          type: string
          enum:
            - dealer
            - service
            - parts
            - all
          default: dealer
        valid_only:
          type: boolean
          default: true
        rating_min:
          type: number
          minimum: 1
          maximum: 5
        rating_max:
          type: number
          minimum: 1
          maximum: 5

    QueryOutput:
      type: object
      additionalProperties: false
      properties:
        shape:
          type: string
          enum:
            - compact
            - raw
          default: compact
        max_rows:
          type: integer
          minimum: 1
          maximum: 200
          description: Maximum aggregate rows for ranking/gap/temporal. Does not control review pagination.
        include_evidence:
          type: boolean
        evidence_per_row:
          type: integer
          minimum: 1
          maximum: 200
          description: Legacy evidence hint. For evidence/review_count, limit controls real pagination.
        limit:
          type: integer
          minimum: 1
          maximum: 200
          description: Review page size for evidence/review_count intents.
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Zero-based review offset. Continue with next_offset until has_more is false.
        sort:
          type: string
          enum:
            - asc
            - desc

    AgentRouterResponse:
      type: object
      properties:
        ok:
          type: boolean
        tenant_id:
          type: string
        intent:
          type: string
        engine:
          type: string
        semantic_required:
          type: boolean
        shape:
          type: string
        result:
          type: object
          additionalProperties: true
          properties:
            ok:
              type: boolean
            query:
              type: object
            rows:
              type: array
              items:
                $ref: '#/components/schemas/CompactRow'
            row_count:
              type: integer
            total_reviews:
              type: integer
            rating_1_reviews:
              type: integer
            rating_2_reviews:
              type: integer
            rating_3_reviews:
              type: integer
            rating_4_reviews:
              type: integer
            rating_5_reviews:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            reviews_returned:
              type: integer
            has_more:
              type: boolean
            next_offset:
              type:
                - integer
                - 'null'
            evidence_returned:
              type: integer
            evidence_limit:
              type: integer
            is_partial:
              type: boolean
            evidence:
              type: array
              items:
                $ref: '#/components/schemas/Evidence'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Evidence'
            source:
              type: string
            requested_date:
              type:
                - string
                - 'null'
            effective_captured_date:
              type:
                - string
                - 'null'
            universe:
              type: object
              additionalProperties: true
            markets:
              type: array
              items:
                type: object
                additionalProperties: true
            places:
              type: array
              items:
                type: object
                additionalProperties: true
            pagination:
              type: object
              additionalProperties: true

    CompactRow:
      type: object
      properties:
        location:
          type: string
        brand:
          type: string
        operator:
          type: string
        store_role:
          type: string
        market_group:
          type: string
        region:
          type: string
        rating:
          type: number
        reviews:
          type: integer
        confidence:
          type: string
          enum:
            - baja
            - media
            - alta
        gap_vs_top:
          type: number
        position:
          type: integer
        top_brand:
          type: string
        top_name:
          type: string
        top_rating:
          type: number
        top_reviews:
          type: integer
        date_from:
          type: string
        date_to:
          type: string
        delta_rating:
          type: number
        delta_reviews_count:
          type: number
        delta_gap_vs_top:
          type: number
        delta_position:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'

    Evidence:
      type: object
      properties:
        place_id:
          type: string
        name:
          type: string
        review_hash:
          type: string
        rating:
          type: number
        text:
          type: string
        author:
          type: string
        review_date:
          type: string
        sentiment:
          type: string
        topic:
          type: string
        severity:
          type: string
        risk_type:
          type: string
        requires_alert:
          type: boolean
        summary:
          type: string
        evidence_excerpt:
          type: string
