openapi: 3.1.0
info:
  title: GMB Agent Router
  version: 1.0.0
  description: Action schema for the Custom GPT reputation agent.

servers:
  - url: https://gmb-cidef.vercel.app

paths:
  /api/agent/router:
    post:
      operationId: routeAgentIntent
      summary: Route a reputation analysis request to the backend query engine
      description: Converts an intent and structured params into a backend query over indexed Google Maps reputation data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRouterRequest"
      responses:
        "200":
          description: Routed query result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRouterResponse"

components:
  schemas:
    AgentRouterRequest:
      type: object
      required:
        - intent
      properties:
        intent:
          type: string
          description: User intent resolved by the LLM before calling the backend.
          enum:
            - ranking
            - gap
            - temporal
            - evidence
            - action
            - cause
        params:
          $ref: "#/components/schemas/AgentRouterParams"

    AgentRouterParams:
      type: object
      properties:
        date:
          type: string
          description: Target date in YYYY-MM-DD format. If omitted, backend default applies.
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        date_from:
          type: string
          description: Start date for temporal comparisons in YYYY-MM-DD format.
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        date_to:
          type: string
          description: End date for temporal comparisons in YYYY-MM-DD format.
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        scope:
          type: string
          enum:
            - intra
            - extra
            - temporal
          description: Query scope. Usually omitted because router sets it from intent.
        dimension:
          type: string
          enum:
            - location
            - brand
            - operator
            - store_role
          description: Aggregation dimension. Default is location.
        metric:
          type: string
          enum:
            - rating
            - reviews_count
            - gap_vs_top
            - position
            - delta_rating
            - delta_reviews_count
            - delta_gap_vs_top
            - delta_position
          description: Metric to rank or compare.
        filters:
          $ref: "#/components/schemas/QueryFilters"
        output:
          $ref: "#/components/schemas/QueryOutput"

    QueryFilters:
      type: object
      properties:
        location:
          type: string
          description: Optional normalized location filter, for example mall_plaza_egana. Use when the user asks about a specific location.
        ownership_group:
          type: string
          enum:
            - own
            - competitor
            - all
          description: Ownership filter. For client-owned locations, use own.
        own_values:
          type: array
          description: Internal ownership values treated as own. Usually omit; backend defaults to [own].
          items:
            type: string
        store_role:
          type: string
          enum:
            - dealer
            - service
            - parts
            - all
          description: Store role filter. Default should usually be dealer.
        valid_only:
          type: boolean
          description: Whether to keep only statistically valid confidence rows. Usually omit; backend defaults to true.

    QueryOutput:
      type: object
      properties:
        shape:
          type: string
          enum:
            - compact
            - raw
          description: Use compact for runtime LLM responses. Use raw only for debug or audit.
        max_rows:
          type: integer
          minimum: 1
          maximum: 200
          description: Maximum rows to return.
        include_evidence:
          type: boolean
          description: Whether to include review evidence.
        evidence_per_row:
          type: integer
          minimum: 1
          maximum: 10
          description: Maximum review evidence items per row.
        sort:
          type: string
          enum:
            - asc
            - desc
          description: Sort direction.

    AgentRouterResponse:
      type: object
      properties:
        ok:
          type: boolean
        intent:
          type: string
        engine:
          type: string
        semantic_required:
          type: boolean
        shape:
          type: string
        result:
          type: object
          properties:
            ok:
              type: boolean
            query:
              type: object
            rows:
              type: array
              items:
                $ref: "#/components/schemas/CompactRow"
            row_count:
              type: integer
            source:
              type: string

    CompactRow:
      type: object
      properties:
        location:
          type: string
        rating:
          type: number
        reviews:
          type: integer
        confidence:
          type: string
          enum:
            - baja
            - media
            - alta
        gap_vs_top:
          type: number
        position:
          type: integer
        top_brand:
          type: string
        top_name:
          type: string
        top_rating:
          type: number
        top_reviews:
          type: integer
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"

    Evidence:
      type: object
      properties:
        rating:
          type: number
        text:
          type: string
        author:
          type: string
        review_date:
          type: string
